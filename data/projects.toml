[portway]
name = "Portway"
slug = "portway"
summary = "Use a phone as a mouse and keyboard for a Linux machine. Portway serves the controller over the local network and sends input through /dev/uinput."
platform = "Linux"
language = "Rust"
version = "0.1.0"
license = "MIT"
repository_url = "https://github.com/heptanal/portway"
install_command = "git clone https://github.com/heptanal/portway.git\ncd portway\ncargo build --release --locked\nscripts/install-linux"

[light_wizard]
name = "Light Wizard"
slug = "light-wizard"
summary = "Turn system audio or a local file into color on WiZ lights. Analysis and light control stay on the Mac and local network."
platform = "macOS 13+"
language = "Rust"
version = "0.1.0"
repository_url = "https://github.com/heptanal/light-wizard"
install_command = "git clone https://github.com/heptanal/light-wizard.git\ncd light-wizard\ncargo install --path . --locked\nlight-wizard --discover-only\nlight-wizard"
