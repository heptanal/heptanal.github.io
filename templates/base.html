<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">

    {% set page_title = section.title | default(value=config.title) %}
    {% set page_description = section.description | default(value=config.description) %}
    <title>{% block title %}{{ page_title }} · {{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ page_description }}">
    <meta name="author" content="{{ config.author }}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ page_description }}">
    <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
    <meta name="twitter:card" content="summary">

    <link rel="canonical" href="{{ current_url | default(value=config.base_url) }}">
    <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ get_url(path='styles/site.css') }}">
    <script src="{{ get_url(path='scripts/site.js') }}" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    {% block body %}{% endblock body %}
  </body>
</html>
